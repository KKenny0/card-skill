<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>SVG text outside viewBox fixture</title>
  <style>
    html, body { margin: 0; padding: 0; background: #f6f4ee; }
    .page { width: 1080px; height: 720px; padding: 80px; box-sizing: border-box; }
    h1 { font-size: 56px; font-family: serif; color: #172434; margin: 0 0 40px 0; }
  </style>
</head>
<body>
  <div class="page">
    <h1>Fixture: SVG text outside viewBox</h1>
    <!-- viewBox is 200x100. The text-anchor=end x=200 puts the right edge
         exactly at the viewBox right boundary -- but the text width pushes
         the bbox past it. check-output.mjs should report svg_text_outside_viewbox. -->
    <svg viewBox="0 0 200 100" width="400" height="200" xmlns="http://www.w3.org/2000/svg">
      <rect x="0" y="0" width="200" height="100" fill="none" stroke="#ccc"/>
      <text x="200" y="50" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="14" fill="#172434">THIS TEXT IS WAY TOO LONG FOR THE VIEWBOX</text>
      <text x="-10" y="80" font-family="JetBrains Mono, monospace" font-size="12" fill="#172434">left overflow</text>
      <text x="100" y="-5" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" fill="#172434">top overflow</text>
    </svg>
  </div>
</body>
</html>
