<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  @font-face {
    font-family: 'XiangcuiDengcusong';
    src: url('file://{{FONT_BASE}}/XiangcuiDengcusong.ttf') format('truetype');
    font-weight: normal;
  }
  @font-face {
    font-family: 'XiangcuiDazijiti';
    src: url('file://{{FONT_BASE}}/香萃打字机体 W40.ttf') format('truetype');
    font-weight: normal;
  }

  :root {
    --bg: #f5f0e8;
    --green: #e9e1d4;
    --pink: #9b6048;
    --accent: #9b6048;
    --yellow: #efe6d8;
    --ink: #2c2418;
    --ink-light: #6b6050;
    --white: #fbfaf6;
    --surface-1: #fbfaf6;
    --surface-2: #e9e1d4;
    --hairline: #d8cdbc;
    --radius: 6px;
    --serif: 'DM Serif Display', Georgia, serif;
    --sans: 'DM Sans', -apple-system, system-ui, sans-serif;
    --mono: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace;
    --zh-serif: 'XiangcuiDengcusong', serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1080px;
    background:
      radial-gradient(ellipse at 28% 16%, rgba(255, 248, 232, 0.34), transparent 58%),
      var(--bg);
    color: var(--ink);
  }

  .page {
    width: 1080px;
    background: transparent;
    position: relative;
  }

  .page > .grain {
    position: absolute;
    inset: 0;
    filter: url(#noise);
    opacity: 0.018;
    pointer-events: none;
    z-index: 100;
  }

  mark {
    background: var(--yellow);
    color: inherit;
    padding: 3px 7px;
    border-radius: 3px;
  }

  .colophon {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 28px 60px 36px;
    border-top: 1px solid var(--hairline);
  }

  .colophon .who {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .colophon .who img {
    width: 40px; height: 40px;
    border-radius: 50%; object-fit: cover;
  }

  .colophon .who img[src=""] {
    display: none;
  }

  .colophon .who span {
    font: 400 24px/1 var(--sans);
    color: var(--ink-light);
  }

  .colophon .info-source {
    font: 400 24px/1 var(--mono);
    color: var(--ink-light);
  }

  {{CUSTOM_CSS}}
</style>
</head>
<body>
<svg width="0" height="0" style="position:absolute">
  <filter id="noise">
    <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
    <feColorMatrix type="saturate" values="0"/>
  </filter>
</svg>
<div class="page">
  <div class="grain"></div>
  {{CONTENT_HTML}}
  <div class="colophon">
    <div class="who">
      <img src="{{LOGO}}" alt="">
      <span>{{BRAND_NAME}}</span>
    </div>
    {{SOURCE_LINE}}
  </div>
</div>
</body>
</html>
