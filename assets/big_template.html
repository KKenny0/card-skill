<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>card-skill — Big Mode</title>

<!--
  ╔══════════════════════════════════════════════════════════════════╗
  ║  BIG MODE TEMPLATE (大字报)                                     ║
  ║  Brand-agnostic — override CSS variables to theme               ║
  ║  Theme: set class="dark" or class="light" on <html>            ║
  ║  Dark designs → class="dark" (default)                          ║
  ║  Light designs → class="light" (softer grain, adjusted ghost)  ║
  ╠══════════════════════════════════════════════════════════════════╣
  ║                                                                  ║
  ║  PLACEHOLDERS                                                    ║
  ║  ──────────────────────────────────────────────────────────────  ║
  ║  {{PHRASE_HTML}}                                                 ║
  ║    The main body text. Use <br> for line breaks and              ║
  ║    <span class="accent">word</span> to highlight words in the   ║
  ║    accent color.                                                 ║
  ║    Example: <span class="accent">Agent</span> 不是<br>加了循环  ║
  ║                                                                  ║
  ║  {{FONT_SIZE}}                                                   ║
  ║    Dynamic font-size for the main phrase, based on character     ║
  ║    count. Typical values: "160px", "190px", "220px".             ║
  ║    Guide:  <=10 chars → 220px, 11-20 → 190px, 21+ → 160px      ║
  ║                                                                  ║
  ║  {{GHOST_CHAR}}                                                  ║
  ║    Single character used as a large, low-opacity watermark       ║
  ║    behind the main text.                                         ║
  ║    Example: "A", "问", "知"                                      ║
  ║                                                                  ║
  ║  {{ATTRIBUTION}}                                                 ║
  ║    Optional attribution line below the main phrase.              ║
  ║    Can be empty string — the attribution element is hidden when  ║
  ║    no attribution is needed.                                     ║
  ║    Example: "— Alan Kay", "—— 出自《人月神话》"                  ║
  ║                                                                  ║
  ║  {{LOGO}}                                                        ║
  ║    Absolute file path or URL to the brand logo image.            ║
  ║    Example: "file:///path/to/logo.png"                           ║
  ║                                                                  ║
  ║  {{BRAND_NAME}}                                                  ║
  ║    Brand name displayed in the colophon footer next to the logo. ║
  ║    Example: "card", "MyBrand"                              ║
  ║                                                                  ║
  ╠══════════════════════════════════════════════════════════════════╣
  ║  CSS VARIABLE OVERRIDES                                         ║
  ║  ──────────────────────────────────────────────────────────────  ║
  ║  Override these on :root to change the color scheme:             ║
  ║    --bg          Canvas / card background (default: #151413)     ║
  ║    --accent      Highlight / accent color (default: #7b84b8)     ║
  ║    --ink         Main text color (default: #e8e2da)              ║
  ║    --ink-muted   Secondary / muted text (default: #aaa297)       ║
  ║    --surface-1   Card / surface overlay (default: #1d1b18)       ║
  ║    --hairline    Divider / border color (default: #353129)       ║
  ║                                                                  ║
  ║  LIGHT THEME EXAMPLE:                                            ║
  ║    --bg: #f5f0e8; --accent: #9b6048; --ink: #2c2418;            ║
  ║    --ink-muted: #6b6050; --surface-1: #fbfaf6;                  ║
  ║    --hairline: #d8cdbc;                                          ║
  ╚══════════════════════════════════════════════════════════════════╝
-->

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  /* ── Design Tokens (dark default — renderer overrides on :root, swaps class for light) ── */
  :root {
    --bg:         #151413;
    --accent:     #7b84b8;
    --ink:        #e8e2da;
    --ink-muted:  #aaa297;
    --surface-1:  #1d1b18;
    --hairline:   #353129;
    --radius:     8px;
  }

  /* ── Light theme visual adjustments ── */
  html.light .card::after {
    opacity: 0.08;
  }
  html.light .ghost {
    -webkit-text-stroke: 1px color-mix(in srgb, var(--accent) 10%, transparent);
  }

  /* ── Font Face: XiangcuiDengcusong (local) ── */
  @font-face {
    font-family: 'XiangcuiDengcusong';
    src: url('file://{{FONT_BASE}}/XiangcuiDengcusong.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
  }

  /* ── Reset ── */
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  /* ── Page Canvas ── */
  body {
    background: var(--bg);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ── Card: fixed 1080×1440 canvas ── */
  .card {
    position: relative;
    width: 1080px;
    height: 1440px;
    overflow: hidden;
    background: var(--bg);
    border-radius: var(--radius);
  }

  html.light .card {
    background:
      radial-gradient(ellipse at 30% 18%, rgba(255, 248, 232, 0.32), transparent 58%),
      var(--bg);
  }

  html.dark .card {
    background:
      radial-gradient(ellipse at 30% 18%, rgba(232, 226, 218, 0.055), transparent 54%),
      var(--bg);
  }

  /* ── SVG Filters (hidden) ── */
  .svg-filters {
    position: absolute;
    width: 0;
    height: 0;
  }

  /* ── Quiet paper atmosphere ── */
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(
        ellipse 70% 50% at 50% 45%,
        color-mix(in srgb, var(--accent) 2%, transparent) 0%,
        transparent 100%
      );
    pointer-events: none;
    z-index: 0;
  }

  /* ── Weathered paper grain overlay (washi effect) ── */
  .card::after {
    content: '';
    position: absolute;
    inset: 0;
    filter: url(#paper-grain);
    opacity: 0.12;
    pointer-events: none;
    z-index: 0;
  }

  /* ── Ghost Watermark Character ── */
  .ghost {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -55%);
    font-family: 'DM Serif Display', Georgia, serif;
    font-size: 900px;
    font-weight: 400;
    line-height: 1;
    letter-spacing: -0.04em;
    color: transparent;
    -webkit-text-stroke: 1px color-mix(in srgb, var(--accent) 8%, transparent);
    paint-order: stroke fill;
    pointer-events: none;
    z-index: 1;
    user-select: none;
  }

  /* ── Main Content Wrapper ── */
  .content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100%;
    padding: 80px 60px;
    text-align: center;
  }

  /* ── Depth surface behind text (responsive) ── */
  .content::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: calc(100% - 80px);
    height: calc(100% - 160px);
    background: var(--surface-1);
    border: 1px solid var(--hairline);
    border-radius: var(--radius);
    z-index: -1;
    opacity: 0.52;
  }

  /* ── Main Phrase (大字报) ── */
  .phrase {
    font-family: 'XiangcuiDengcusong', serif;
    /* {{FONT_SIZE}} placeholder is set via inline style */
    line-height: 1.22;
    letter-spacing: 0.02em;
    color: var(--ink);
    /* Line breaks are 100% controlled by <br> tags in the content.
       CSS must NOT add automatic wrapping — it would split mid-phrase.
       Width safety is enforced by mode-big.md's semantic breaking rules. */
    white-space: pre-line;
  }

  .phrase .accent {
    color: var(--accent);
  }

  /* ── Decorative Hairline Rules ── */
  .rule {
    width: 80px;
    height: 1px;
    background: var(--hairline);
    margin: 40px auto;
  }

  /* ── Attribution Line ── */
  .attribution {
    font-family: 'DM Sans', 'Helvetica Neue', sans-serif;
    font-size: 24px;
    font-weight: 400;
    letter-spacing: 0.04em;
    color: var(--ink-muted);
    margin-top: 12px;
  }

  /* Hide attribution when empty */
  .attribution:empty {
    display: none;
  }

  /* ── Colophon / Footer ── */
  .colophon {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 3;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 36px 40px;
    border-top: 1px solid var(--hairline);
    background: linear-gradient(0deg, var(--bg) 60%, transparent 100%);
  }

  .colophon img {
    width: 28px;
    height: 28px;
    opacity: 0.55;
  }

  .colophon span {
    font-family: 'JetBrains Mono', 'DM Sans', monospace;
    font-size: 24px;
    font-weight: 400;
    letter-spacing: 0.06em;
    color: var(--ink-muted);
  }
</style>
</head>
<body>

<!-- SVG Filters: weathered paper grain (washi effect) -->
<svg class="svg-filters">
  <defs>
    <filter id="paper-grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="4" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="gray-noise"/>
      <feBlend in="SourceGraphic" in2="gray-noise" mode="multiply"/>
    </filter>
  </defs>
</svg>

<div class="card">

  <!-- Ghost watermark: single low-opacity character behind the text -->
  <div class="ghost">{{GHOST_CHAR}}</div>

  <!-- Main content -->
  <div class="content">
    <div class="rule"></div>
    <div class="phrase" style="font-size: {{FONT_SIZE}};">
      {{PHRASE_HTML}}
    </div>
    <!-- Attribution: rendered below the phrase; hidden when empty -->
    <div class="attribution">{{ATTRIBUTION}}</div>
    <div class="rule"></div>
  </div>

  <!-- Colophon: brand logo + name at the bottom -->
  <div class="colophon">
    <img src="{{LOGO}}" alt="logo">
    <span>{{BRAND_NAME}}</span>
  </div>

</div>

</body>
</html>
