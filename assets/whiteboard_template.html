<!--
  ═══════════════════════════════════════════════════════════
  Whiteboard (白板) Template — Brand-Agnostic
  ═══════════════════════════════════════════════════════════

  PLACEHOLDERS
  ────────────
  {{SUBTITLE}}    — Subtitle / kicker line (e.g. "推理链：从 API 调用到自主决策")
  {{TITLE_HTML}}  — Title with optional <span class="keyword">accent</span>
  {{STEPS_HTML}}  — All step sections: chain nodes, layer cards, insight boxes
  {{LOGO}}        — Path to brand logo image
  {{BRAND_NAME}}  — Brand / tool name for colophon

  CSS VARIABLES (override to theme)
  ──────────────────────────────────
  --bg         — Canvas / page background
  --surface-1  — Elevated surface (layer cards)
  --surface-2  — Secondary surface (insight box)
  --accent     — Accent / highlight colour
  --ink        — Primary text colour
  --ink-muted  — Secondary / muted text colour
  --hairline   — Border / divider colour

  ═══════════════════════════════════════════════════════════
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>{{BRAND_NAME}} | 白板</title>
<style>
  /* ─── Font-face ─── */
  @font-face {
    font-family: 'XiangcuiDengcusong';
    src: url('file:///Users/kennywu/Documents/3-VibeProject/skills/cast/assets/fonts/XiangcuiDengcusong.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
  }

  @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Kalam:wght@300;400;700&family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap');

  /* ─── Theme tokens (override per-brand) ─── */
  :root {
    --bg:         #0a0a0e;
    --surface-1:  #111215;
    --surface-2:  #181a1e;
    --accent:     #7176c4;
    --ink:        #e2dfd9;
    --ink-muted:  #8a8f98;
    --hairline:   #23252a;
  }

  /* ─── Reset ─── */
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--ink);
    width: 1080px;
    margin: 0 auto;
    font-family: 'Kalam', 'PingFang SC', 'Microsoft YaHei', 'DM Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* ─── Whiteboard canvas ─── */
  .whiteboard {
    position: relative;
    width: 1080px;
    padding: 72px 80px 60px 80px;
    background:
      radial-gradient(ellipse 70% 50% at 50% 0%, color-mix(in srgb, var(--accent) 6%, transparent) 0%, transparent 70%),
      radial-gradient(ellipse 50% 40% at 80% 60%, color-mix(in srgb, var(--accent) 3%, transparent) 0%, transparent 60%),
      var(--bg);
  }

  /* ═══════════════════════════════════
     Typography
     ═══════════════════════════════════ */

  /* ─── Subtitle / kicker ─── */
  .subtitle {
    font-family: 'JetBrains Mono', 'DM Sans', monospace;
    font-size: 18px;
    color: var(--ink-muted);
    letter-spacing: 1.5px;
    text-transform: none;
    margin-bottom: 12px;
    opacity: 0.85;
  }

  /* ─── Main title ─── */
  .title {
    font-family: 'XiangcuiDengcusong', 'PingFang SC', 'Permanent Marker', cursive;
    font-size: 52px;
    line-height: 1.3;
    color: var(--ink);
    margin-bottom: 8px;
    max-width: 860px;
  }

  .title .keyword {
    color: var(--accent);
  }

  /* ─── Wavy SVG underline ─── */
  .title-wave {
    margin-bottom: 56px;
    margin-top: -2px;
  }

  .title-wave svg {
    opacity: 0.3;
  }

  /* ═══════════════════════════════════
     Sections & Steps
     ═══════════════════════════════════ */

  .section {
    margin-bottom: 60px;
  }

  .section-label {
    font-family: 'JetBrains Mono', 'DM Sans', monospace;
    font-size: 14px;
    color: var(--ink-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;
    opacity: 0.6;
  }

  .step-num {
    font-family: 'Permanent Marker', 'Kalam', cursive;
    font-size: 18px;
    color: var(--ink-muted);
    opacity: 0.5;
    margin-bottom: 12px;
    letter-spacing: 1px;
  }

  /* ═══════════════════════════════════
     Chain (horizontal reasoning)
     ═══════════════════════════════════ */

  .chain {
    display: flex;
    align-items: center;
    gap: 0;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .chain-node {
    font-family: 'XiangcuiDengcusong', 'Kalam', 'PingFang SC', cursive;
    font-size: 36px;
    color: var(--ink);
    line-height: 1.5;
    padding: 6px 4px;
    white-space: nowrap;
  }

  .chain-node .highlight {
    color: var(--accent);
    font-weight: 700;
  }

  .chain-node .muted {
    color: var(--ink-muted);
    font-size: 28px;
  }

  .chain-arrow {
    display: inline-flex;
    align-items: center;
    margin: 0 14px;
    opacity: 0.5;
  }

  .chain-arrow svg {
    width: 36px;
    height: 20px;
  }

  /* ═══════════════════════════════════
     Annotation
     ═══════════════════════════════════ */

  .annotation {
    font-family: 'Kalam', 'PingFang SC', 'DM Sans', cursive;
    font-size: 24px;
    color: var(--ink-muted);
    line-height: 1.6;
    margin-bottom: 36px;
    padding-left: 4px;
  }

  .annotation .em {
    color: var(--ink);
    font-weight: 700;
  }

  /* ═══════════════════════════════════
     Layer cards
     ═══════════════════════════════════ */

  .layers {
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-bottom: 20px;
    margin-left: 16px;
  }

  .layer {
    display: flex;
    align-items: flex-start;
    gap: 20px;
    padding: 18px 24px;
    background: var(--surface-1);
    border-radius: 12px;
    border: 1px solid var(--hairline);
    max-width: 820px;
  }

  .layer-icon {
    flex-shrink: 0;
    width: 42px;
    height: 42px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 2px;
  }

  .layer-body {
    flex: 1;
  }

  .layer-name {
    font-family: 'XiangcuiDengcusong', 'PingFang SC', 'Kalam', cursive;
    font-size: 30px;
    color: var(--ink);
    margin-bottom: 4px;
    line-height: 1.4;
  }

  .layer-desc {
    font-family: 'Kalam', 'PingFang SC', 'DM Sans', cursive;
    font-size: 24px;
    color: var(--ink-muted);
    line-height: 1.5;
  }

  /* ═══════════════════════════════════
     Insight / conclusion box
     ═══════════════════════════════════ */

  .insight-box {
    display: flex;
    align-items: flex-start;
    gap: 24px;
    padding: 28px 32px;
    background: var(--surface-2);
    border-radius: 14px;
    border: 1px solid var(--hairline);
    max-width: 860px;
    margin-top: 60px;
  }

  .insight-box .insight-icon {
    flex-shrink: 0;
  }

  .insight-box .insight-text {
    font-family: 'XiangcuiDengcusong', 'PingFang SC', 'Kalam', cursive;
    font-size: 34px;
    color: var(--ink);
    line-height: 1.5;
  }

  .insight-box .insight-text .accent-word {
    color: var(--accent);
  }

  /* ═══════════════════════════════════
     Colophon
     ═══════════════════════════════════ */

  .colophon {
    margin-top: 80px;
    padding-top: 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    opacity: 0.35;
  }

  .colophon img {
    width: 24px;
    height: 24px;
    border-radius: 4px;
  }

  .colophon span {
    font-family: 'JetBrains Mono', 'DM Sans', monospace;
    font-size: 13px;
    color: var(--ink-muted);
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<div class="whiteboard">

  <!-- Subtitle -->
  <div class="subtitle">{{SUBTITLE}}</div>

  <!-- Title -->
  <div class="title">{{TITLE_HTML}}</div>

  <!-- Wavy underline -->
  <div class="title-wave">
    <svg width="580" height="16" viewBox="0 0 580 16" fill="none">
      <path d="M2 10 Q40 2, 80 10 T160 10 T240 10 T320 10 T400 10 T480 10 T560 10"
            stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round"
            style="color: var(--accent);"/>
    </svg>
  </div>

  <!-- ═══ Steps content ═══ -->
  {{STEPS_HTML}}

  <!-- ═══ Colophon ═══ -->
  <div class="colophon">
    <img src="{{LOGO}}" alt="logo"/>
    <span>{{BRAND_NAME}}</span>
  </div>

</div>
