<!--
  sketchnote_template.html — Brand-agnostic template for "sketchnote" (视觉笔记) mode

  Placeholders:
    {{TITLE}}         — Article / concept title (appears in magazine head h1)
    {{SUBTITLE}}      — One-line summary / deck (italic lead below title)
    {{CONTENT_HTML}}  — Main body: narrative arc sections (feature, note, archive, cross, hero, closing)
    {{CUSTOM_CSS}}    — Per-card custom CSS overrides
    {{LOGO}}          — Brand logo image URL (40x40 circle; hidden if empty)
    {{BRAND_NAME}}    — Brand / author name displayed in colophon
    {{SOURCE_LINE}}   — Source attribution (optional, e.g. journal / paper reference)

  CSS Variables (override in CUSTOM_CSS or inline):
    --bg          : Canvas background           (default #FAF7EF warm cream)
    --surface-1   : Card / paper surface         (default #F5F1E5)
    --surface-2   : Secondary surface / note     (default #FFFBF1 sticky-note)
    --accent-1    : Primary accent — red         (default #B23A2C)
    --accent-2    : Secondary accent — blue      (default #3D5A80)
    --accent-3    : Tertiary accent — amber      (default #BB8A2B)
    --ink         : Main text color              (default #1F1F1F)
    --ink-muted   : Secondary / muted text       (default #6B6B6B)
    --hairline    : Border / rule color          (default rgba(15,15,15,0.16))

  Layout classes (per spec):
    .page            — Main 1080px container
    .magazine-head   — Top masthead with title + deck
    .note-card       — Generic note / section card
    .note-card.feature  — Feature spread (station 1: opening)
    .note-card.hero     — Hero spread (station 5: insight)
    .note-label      — Card label / tag
    .highlight-text  — Key insight emphasis
    .problem-block   — Problem statement block
    .failure-block   — Failure / wrong approach block
    .insight-block   — Key insight / aha moment block
    .naming-block    — Concept naming block
    .divider         — Section divider
    .quote-mark      — Decorative opening quote mark
    .colophon        — Footer with brand + source

  Font system (4 families):
    Serif  : DM Serif Display (Latin) + XiangcuiDengcusong (CJK)
    Sans   : DM Sans (Latin) + system CJK fallback
    Mono   : JetBrains Mono
    Hand   : Caveat + Kalam + Permanent Marker (Latin) + 楷体 (CJK)
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  /* ── Fonts ── */
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700;900&family=JetBrains+Mono:wght@400;500;600;700&family=Caveat:wght@400;500;600;700&family=Kalam:wght@400;700&family=Permanent+Marker&display=swap');

  @font-face {
    font-family: 'XiangcuiDengcusong';
    src: url('file:///Users/kennywu/Documents/3-VibeProject/skills/wjy-mockup/assets/fonts/XiangcuiDengcusong.ttf') format('truetype');
    font-weight: normal;
  }

  /* ── CSS Variables ── */
  :root {
    /* Colors — brand-agnostic defaults (override per card) */
    --bg:          #FAF7EF;
    --surface-1:   #F5F1E5;
    --surface-2:   #FFFBF1;
    --accent-1:    #B23A2C;   /* red — errors, annotations, emphasis */
    --accent-2:    #3D5A80;   /* blue — insight, hero visuals */
    --accent-3:    #BB8A2B;   /* amber — turning point, highlight */
    --accent-3-soft: #D7A85A; /* amber soft — highlight background */
    --ink:         #1F1F1F;
    --ink-muted:   #6B6B6B;
    --ink-strong:  #0F0F0F;
    --ink-fade:    #9A958C;
    --hairline:    rgba(15,15,15,0.16);

    /* Font families */
    --serif:  'DM Serif Display', 'XiangcuiDengcusong', 'Songti SC', Georgia, serif;
    --sans:   'DM Sans', 'PingFang SC', system-ui, sans-serif;
    --mono:   'JetBrains Mono', 'SF Mono', 'Menlo', monospace;
    --hand:   'Caveat', 'Kalam', 'Permanent Marker', '楷体', 'STKaiti', cursive;
  }

  /* ── Reset ── */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; background: var(--bg); }

  /* ── Page Container ── */
  .page {
    width: 1080px;
    background: var(--bg);
    position: relative;
    overflow: hidden;
  }

  /* Grain texture overlay */
  .page > .grain {
    position: absolute;
    inset: 0;
    filter: url(#noise);
    opacity: 0.04;
    pointer-events: none;
    z-index: 100;
  }

  /* ── Magazine Head (Masthead) ── */
  .magazine-head {
    padding: 44px 64px 30px;
    border-bottom: 2px solid var(--ink-strong);
    position: relative;
  }
  .magazine-head::after {
    content: '';
    position: absolute;
    left: 64px; right: 64px; bottom: -8px;
    height: 1px;
    background: var(--ink-strong);
  }
  .magazine-head .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font: 600 12px/1 var(--mono);
    color: var(--ink-muted);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    margin-bottom: 24px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--hairline);
  }
  .magazine-head .top-bar .left { display: flex; align-items: center; gap: 18px; }
  .magazine-head .top-bar .badge {
    background: var(--ink-strong);
    color: var(--bg);
    padding: 5px 11px;
    letter-spacing: 0.18em;
  }
  .magazine-head h1 {
    font: 900 110px/0.92 var(--serif);
    color: var(--ink-strong);
    letter-spacing: -0.03em;
    margin-bottom: 24px;
  }
  .magazine-head .deck {
    font: italic 400 26px/1.45 var(--serif);
    color: var(--ink-muted);
    max-width: 820px;
    border-left: 3px solid var(--ink-strong);
    padding-left: 20px;
  }

  /* ── Shared Components ── */
  .kicker {
    font: 600 13px/1 var(--mono);
    color: var(--ink-muted);
    text-transform: uppercase;
    letter-spacing: 0.22em;
    display: inline-flex;
    align-items: center;
    gap: 12px;
  }
  .kicker .num {
    background: var(--ink-strong);
    color: var(--bg);
    padding: 5px 10px 4px;
    font-weight: 700;
    letter-spacing: 0.12em;
  }
  .kicker .rule {
    width: 36px;
    height: 1px;
    background: var(--ink-strong);
  }

  .head-serif {
    font: 700 56px/1.05 var(--serif);
    margin: 12px 0 16px;
    letter-spacing: -0.018em;
    color: var(--ink-strong);
  }
  .head-sans {
    font: 900 40px/1.12 var(--sans);
    margin: 10px 0 12px;
    letter-spacing: -0.012em;
    color: var(--ink-strong);
  }

  .body-serif p { font: 400 22px/1.6 var(--serif); color: var(--ink); }
  .body-serif p + p { margin-top: 8px; }
  .body-sans p { font: 400 21px/1.6 var(--sans); color: var(--ink); }
  .body-sans p + p { margin-top: 6px; }
  .body em { font-style: normal; font-weight: 700; color: var(--ink-strong); }

  .ask {
    font: 600 30px/1.3 var(--hand);
    color: var(--accent-1);
    margin-top: 14px;
    display: block;
  }

  .drop-cap > p:first-child::first-letter {
    float: left;
    font: 700 84px/0.84 var(--serif);
    color: var(--ink-strong);
    margin: 4px 12px -4px 0;
  }

  mark {
    background: rgba(255,242,0,0.45);
    color: inherit;
    padding: 4px 8px;
  }

  /* ── Note Card (generic section card) ── */
  .note-card {
    border-top: 1px solid var(--hairline);
  }

  /* ── Feature (Station 1: Opening) ── */
  .note-card.feature {
    padding: 38px 64px 44px;
    background: var(--surface-1);
    border-bottom: 1px solid var(--hairline);
    display: grid;
    grid-template-columns: 6fr 6fr;
    gap: 32px;
    align-items: start;
  }
  .note-card.feature .lead {
    font: italic 400 22px/1.45 var(--serif);
    margin-bottom: 16px;
    padding: 0 0 0 18px;
    border-left: 2px solid var(--accent-1);
  }

  /* ── Note (Station 2: Failure — margin note with sidekick + paper) ── */
  .note-card.note {
    margin: 24px 64px 0;
    display: grid;
    grid-template-columns: 1fr 540px;
    gap: 32px;
    align-items: start;
    padding-top: 6px;
  }

  /* Sidekick (left column of note — doodle / formula / arrow) */
  .note-card.note .sidekick {
    align-self: stretch;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 14px;
    padding: 8px 4px 8px 0;
  }
  .note-card.note .sidekick svg {
    display: block;
    max-width: 100%;
    height: auto;
  }
  .note-card.note .sidekick .formula {
    font: 600 22px/1.4 var(--hand);
    color: var(--ink);
    padding: 8px 14px;
    border-left: 2px dashed var(--ink-fade);
    transform: rotate(-1deg);
  }
  .note-card.note .sidekick .formula em {
    color: var(--accent-1);
    font-style: normal;
    font-weight: 700;
  }
  .note-card.note .sidekick .arrow {
    font: 600 26px/1.1 var(--hand);
    color: var(--accent-1);
    transform: rotate(6deg);
    align-self: flex-end;
    margin-right: -4px;
  }
  .note-card.note .sidekick .doodle-caption {
    font: italic 400 14px/1.4 var(--serif);
    color: var(--ink-muted);
    margin-top: 4px;
  }

  /* Paper (right column — sticky note) */
  .note-card.note .paper {
    padding: 22px 26px 22px 28px;
    background: var(--surface-2);
    border: 1px solid rgba(120,110,80,0.32);
    border-left: 4px solid var(--accent-1);
    box-shadow: 5px 9px 22px -12px rgba(0,0,0,0.22);
    position: relative;
    transform: rotate(0.5deg);
    transform-origin: top right;
  }
  .note-card.note .paper::before {
    content: '';
    position: absolute;
    top: -1px; left: -1px; right: -1px; height: 4px;
    background: repeating-linear-gradient(90deg, transparent 0 6px, rgba(120,110,80,0.18) 6px 8px);
  }
  .note-card.note .paper .strike {
    text-decoration: line-through;
    text-decoration-color: var(--accent-1);
    text-decoration-thickness: 2.5px;
    color: var(--ink-fade);
  }
  .note-card.note .paper .scribble {
    position: absolute;
    right: -8px; top: 28px;
    font: 600 24px/1.15 var(--hand);
    color: var(--accent-1);
    transform: rotate(6deg);
    background: var(--surface-2);
    padding: 6px 12px 4px;
    border: 1px dashed var(--accent-1);
    white-space: nowrap;
  }
  .note-card.note .paper .footnote {
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px dashed rgba(120,110,80,0.4);
    font: 500 13px/1.4 var(--mono);
    color: var(--ink-muted);
    display: flex;
    gap: 8px;
  }
  .note-card.note .paper .footnote .mark {
    color: var(--accent-1);
    font-weight: 700;
  }

  /* ── Archive (Station 3: Failure — archive label with stamp) ── */
  .note-card.archive {
    margin: 24px 64px 0;
    background: var(--bg);
    border-top: 2px solid var(--ink-strong);
    border-bottom: 1px solid var(--hairline);
    display: grid;
    grid-template-columns: 156px 1fr;
    align-items: stretch;
  }
  .note-card.archive .stamp {
    background: var(--ink-strong);
    color: var(--bg);
    padding: 22px 16px;
    font: 700 12px/1.4 var(--mono);
    letter-spacing: 0.16em;
    text-transform: uppercase;
    text-align: center;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 8px;
  }
  .note-card.archive .stamp .label {
    border: 1px solid rgba(255,255,255,0.45);
    padding: 4px 6px;
  }
  .note-card.archive .stamp .x {
    font: 700 56px/1 var(--serif);
    color: #C85042;
  }
  .note-card.archive .body-area {
    padding: 22px 28px 24px;
  }
  .note-card.archive .verdict {
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px dashed var(--hairline);
    font: italic 600 19px/1.4 var(--serif);
    color: var(--accent-1);
  }

  /* ── Cross (Station 4: Turning point — mega headline) ── */
  .note-card.cross {
    padding: 64px 64px 60px;
    border-top: 1px solid var(--hairline);
    border-bottom: 1px solid var(--hairline);
    margin-top: 30px;
  }
  .note-card.cross .mega {
    font: 900 180px/0.88 var(--serif);
    color: var(--ink-strong);
    letter-spacing: -0.045em;
  }
  .note-card.cross .mega .em {
    background: linear-gradient(180deg, transparent 60%, var(--accent-3-soft, #D7A85A) 60%, var(--accent-3-soft, #D7A85A) 90%, transparent 90%);
    padding: 0 6px;
  }
  .note-card.cross .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 36px;
    align-items: end;
    margin-top: 18px;
  }
  .note-card.cross .left,
  .note-card.cross .right {
    border-top: 2px solid var(--ink-strong);
    padding-top: 16px;
  }
  .note-card.cross .right .caption {
    font: italic 400 16px/1.45 var(--serif);
    color: var(--ink-muted);
    margin-top: 10px;
    padding-left: 10px;
    border-left: 2px solid var(--accent-3);
  }

  /* ── Hero (Station 5: Insight) ── */
  .note-card.hero {
    padding: 52px 64px 48px;
    border-top: 4px solid var(--accent-2);
    margin-top: 32px;
    position: relative;
  }
  .note-card.hero .layout {
    display: grid;
    grid-template-columns: 7fr 5fr;
    gap: 32px;
    align-items: start;
  }
  .note-card.hero .visual .caption {
    font: italic 400 16px/1.45 var(--serif);
    color: var(--ink-muted);
    margin-top: 10px;
    padding-left: 12px;
    border-left: 2px solid var(--accent-2);
  }
  .note-card.hero .pull-quote {
    font: italic 700 36px/1.22 var(--serif);
    color: var(--accent-2);
    margin: 12px 0 18px;
    padding: 6px 0 6px 22px;
    border-left: 4px solid var(--accent-2);
    position: relative;
  }
  .note-card.hero .pull-quote::before {
    content: '\201C';
    position: absolute;
    left: 4px; top: -36px;
    font: 700 88px/1 var(--serif);
    color: var(--accent-2);
    opacity: 0.35;
  }

  /* ── Closing (Station 6: Naming) ── */
  .note-card.closing {
    padding: 60px 64px 64px;
    background: var(--surface-1);
    border-top: 6px double var(--ink-strong);
    margin-top: 32px;
    text-align: center;
  }
  .note-card.closing .approach {
    font: italic 400 24px/1.45 var(--serif);
    color: var(--ink-muted);
    margin-bottom: 24px;
  }
  .note-card.closing .mega-name {
    font: 900 144px/0.95 var(--serif);
    color: var(--ink-strong);
    letter-spacing: -0.028em;
    margin-bottom: 14px;
  }
  .note-card.closing .en-name {
    font: 500 36px/1 var(--sans);
    color: var(--ink-muted);
    letter-spacing: 0.04em;
    margin-bottom: 28px;
  }
  .note-card.closing .byline {
    display: flex;
    justify-content: center;
    align-items: baseline;
    gap: 22px;
    font: 600 14px/1.2 var(--mono);
    color: var(--ink-muted);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 18px 0;
    margin: 0 auto 24px;
    max-width: 820px;
    border-top: 1px solid var(--ink-strong);
    border-bottom: 1px solid var(--ink-strong);
    flex-wrap: wrap;
  }
  .note-card.closing .byline strong {
    color: var(--ink-strong);
    font-weight: 700;
    letter-spacing: 0.12em;
  }
  .note-card.closing .byline .sep {
    color: var(--ink-fade);
    font-weight: 400;
  }
  .note-card.closing .closing-body {
    font: 400 22px/1.7 var(--serif);
    max-width: 760px;
    margin: 0 auto 22px;
    text-align: left;
  }
  .note-card.closing .epilogue {
    font: italic 500 26px/1.45 var(--serif);
    color: var(--ink-strong);
    margin-top: 18px;
  }
  .note-card.closing .epilogue::before {
    content: '\2014 ';
    color: var(--accent-1);
    font-weight: 700;
  }

  /* ── Semantic Blocks ── */
  .problem-block {
    padding: 28px 32px;
    background: var(--surface-1);
    border-left: 4px solid var(--accent-1);
    margin: 20px 0;
  }

  .failure-block {
    padding: 24px 28px;
    background: var(--surface-2);
    border: 1px dashed var(--accent-1);
    margin: 20px 0;
    position: relative;
  }

  .insight-block {
    padding: 28px 32px;
    background: var(--surface-1);
    border-left: 4px solid var(--accent-2);
    margin: 20px 0;
  }

  .naming-block {
    padding: 36px 32px;
    background: var(--surface-1);
    border-top: 4px double var(--ink-strong);
    margin: 20px 0;
    text-align: center;
  }

  /* ── Utility Classes ── */
  .note-label {
    display: inline-block;
    font: 600 11px/1 var(--mono);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 4px 12px;
    background: var(--ink-strong);
    color: var(--bg);
  }

  .highlight-text {
    font: 700 38px/1.15 var(--serif);
    color: var(--ink-strong);
  }

  .divider {
    border: none;
    border-top: 1px solid var(--hairline);
    margin: 32px 64px;
  }

  .quote-mark {
    font: 700 120px/0.8 var(--serif);
    color: var(--accent-2);
    opacity: 0.2;
    display: block;
    margin-bottom: -30px;
    user-select: none;
  }

  /* ── Colophon (Footer) ── */
  .colophon {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 28px 60px 36px;
    border-top: 1px solid var(--hairline);
  }
  .colophon .who {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .colophon .who img {
    width: 40px; height: 40px;
    border-radius: 50%;
    object-fit: cover;
  }
  .colophon .who img[src=""] { display: none; }
  .colophon .who span {
    font: 400 24px/1 var(--sans);
    color: var(--ink-muted);
  }
  .colophon .info-source {
    font: 400 22px/1 var(--mono);
    color: var(--ink-muted);
  }

  /* ── Custom CSS Slot ── */
  {{CUSTOM_CSS}}
</style>
</head>
<body>
<!-- SVG noise filter for grain texture -->
<svg width="0" height="0" style="position:absolute">
  <filter id="noise">
    <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
    <feColorMatrix type="saturate" values="0"/>
  </filter>
</svg>

<div class="page">
  <div class="grain"></div>
  {{CONTENT_HTML}}
  <div class="colophon">
    <div class="who">
      <img src="{{LOGO}}" alt="">
      <span>{{BRAND_NAME}}</span>
    </div>
    {{SOURCE_LINE}}
  </div>
</div>
</body>
</html>
